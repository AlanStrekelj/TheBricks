<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="The Bricks favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- center stacked bricks icon -->
    <rect x="24" y="10" width="16" height="8" rx="2" fill="#ef2b2d"/>
    <rect x="14" y="22" width="16" height="8" rx="2" fill="#4caf50"/>
    <rect x="34" y="22" width="16" height="8" rx="2" fill="#2196f3"/>
    <rect x="24" y="34" width="16" height="8" rx="2" fill="#f4b400"/>
    <rect x="14" y="46" width="16" height="8" rx="2" fill="#ff9800"/>
    <rect x="34" y="46" width="16" height="8" rx="2" fill="#ef2b2d"/>
  </g>
</svg>
